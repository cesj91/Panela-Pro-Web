<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - Panela Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="dashboard">
    <aside class="sidebar">
        <h2>Panela Pro</h2>
                <a href="dashboard.html">Dashboard</a>
                <a href="usuarios.html">Usuarios</a>
                <a href="clientes.html">Clientes</a>
                <a href="productos.html">Productos</a>
                <a href="inventario.html">Inventario</a>
                <a href="produccion.html">Producción</a>
                <a href="ventas.html">Ventas</a>
                <a href="reportes.html">Reportes</a>
        <button onclick="cerrarSesion()">Cerrar sesión</button>
    </aside>

    <main class="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Usuarios</h1>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalUsuario">
                + Nuevo Usuario
            </button>
        </div>

        <div class="card p-4">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Identificación</th>
                        <th>Nombre</th>
                        <th>Usuario</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaUsuarios"></tbody>
            </table>
        </div>
    </main>
</div>

<div class="modal fade" id="modalUsuario" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="formUsuario">
                <div class="modal-header">
                    <h5 class="modal-title">Nuevo Usuario</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <label>Nombre completo</label>
                    <input type="text" id="nombre" class="form-control mb-3" required>

                    <label>Correo</label>
                    <input type="email" id="correo" class="form-control mb-3" required>

                    <label>Usuario</label>
                    <input type="text" id="usuario" class="form-control mb-3" required>

                    <label>Contraseña</label>
                    <input type="password" id="contrasena" class="form-control mb-3" required>

                    <label>Rol</label>
                    <select id="id_rol" class="form-control mb-3" required>
                        <option value="">Seleccione...</option>
                        <option value="1">Administrador</option>
                        <option value="2">Jefe de Producción</option>
                        <option value="3">Operario</option>
                        <option value="4">Almacenista</option>
                        <option value="5">Ventas</option>
                        <option value="6">Gerencia</option>
                    </select>

                    <label>Estado</label>
                    <select id="estado" class="form-control">
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>

                    <div id="mensajeUsuario" class="mt-3 fw-bold"></div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-success">Guardar Usuario</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/usuarios.js"></script>
</body>
</html>
