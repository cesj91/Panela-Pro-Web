<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Producción - Panela Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="dashboard">

<aside class="sidebar">

<h2>Panela Pro</h2>

                <a href="dashboard.html">Dashboard</a>
                <a href="usuarios.html">Usuarios</a>
                <a href="clientes.html">Clientes</a>
                <a href="productos.html">Productos</a>
                <a href="inventario.html">Inventario</a>
                <a href="produccion.html">Producción</a>
                <a href="ventas.html">Ventas</a>
                <a href="reportes.html">Reportes</a>

<button onclick="cerrarSesion()">Cerrar sesión</button>

</aside>

<main class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<h1>Producción</h1>

<button
class="btn btn-success"
data-bs-toggle="modal"
data-bs-target="#modalProduccion">

+ Nuevo Lote

</button>

</div>

<div class="card p-4">

<table class="table table-striped table-hover">

<thead>

<tr>
<th>ID</th>
<th>Código Lote</th>
<th>Producto Final</th>
<th>Cantidad Producida</th>
<th>Fecha Producción</th>
<th>Estado</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tablaProduccion">

</tbody>

</table>

</div>

</main>

</div>

<div class="modal fade" id="modalProduccion">

<div class="modal-dialog">

<div class="modal-content">

<form id="formProduccion">

<div class="modal-header">

<h5 class="modal-title">Nuevo Lote de Producción</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body">

<label>Código lote</label>

<input
id="codigo_lote"
class="form-control mb-3">

<label>Producto final</label>

<input
id="producto_final"
class="form-control mb-3">

<label>Cantidad producida</label>

<input
type="number"
id="cantidad_producida"
class="form-control mb-3">

<label>Fecha producción</label>

<input
type="date"
id="fecha_produccion"
class="form-control mb-3">

<label>Estado</label>

<select
id="estado"
class="form-control">

<option>Activo</option>
<option>Finalizado</option>
<option>Cancelado</option>

</select>

</div>

<div class="modal-footer">

<button
type="button"
class="btn btn-secondary"
data-bs-dismiss="modal">

Cancelar

</button>

<button
type="submit"
class="btn btn-success">

Guardar

</button>

</div>

</form>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/produccion.js"></script>

</body>
</html>
