<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Panela Pro</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <h2>Panela Pro</h2>
            <a href="#">Dashboard</a>
            <a href="usuarios.html">Usuarios</a>
            <a href="#">Clientes</a>
            <a href="#">Productos</a>
            <a href="#">Inventario</a>
            <a href="#">Producción</a>
            <a href="#">Ventas</a>
            <a href="#">Reportes</a>
            <button onclick="cerrarSesion()">Cerrar sesión</button>
        </aside>

        <main class="content">
            <h1>Panel Principal</h1>
            <p id="bienvenida"></p>

            <div class="cards">
                <div class="card">
                    <h3>Productos</h3>
                    <p>4 registrados</p>
                </div>
                <div class="card">
                    <h3>Inventario</h3>
                    <p>Stock disponible</p>
                </div>
                <div class="card">
                    <h3>Producción</h3>
                    <p>Lotes activos</p>
                </div>
                <div class="card">
                    <h3>Ventas</h3>
                    <p>Ventas registradas</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/dashboard.js"></script>
</body>
</html>
