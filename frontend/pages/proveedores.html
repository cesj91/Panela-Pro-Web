<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Proveedores - Panela Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="dashboard">

<aside class="sidebar">

<h2>Panela Pro</h2>

                <a href="dashboard.html">Dashboard</a>
                <a href="usuarios.html">Usuarios</a>
                <a href="clientes.html">Clientes</a>
                <a href="productos.html">Productos</a>
                <a href="inventario.html">Inventario</a>
                <a href="produccion.html">Producción</a>
                <a href="ventas.html">Ventas</a>
                <a href="reportes.html">Reportes</a>

<button onclick="cerrarSesion()">Cerrar sesión</button>

</aside>

<main class="content">

<div class="d-flex justify-content-between align-items-center mb-4">

<h1>Proveedores</h1>

<button
class="btn btn-success"
data-bs-toggle="modal"
data-bs-target="#modalProveedor">

+ Nuevo Proveedor

</button>

</div>

<div class="card p-4">

<table class="table table-striped table-hover">

<thead>

<tr>

<th>ID</th>
<th>Nombre</th>
<th>NIT</th>
<th>Teléfono</th>
<th>Correo</th>
<th>Dirección</th>
<th>Estado</th>
<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaProveedores"></tbody>

</table>

</div>

</main>

</div>

<div class="modal fade" id="modalProveedor">

<div class="modal-dialog">

<div class="modal-content">

<form id="formProveedor">

<div class="modal-header">

<h5 class="modal-title">Nuevo Proveedor</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal">
</button>

</div>

<div class="modal-body">

<label>Nombre</label>
<input id="nombre" class="form-control mb-3">

<label>NIT</label>
<input id="nit" class="form-control mb-3">

<label>Teléfono</label>
<input id="telefono" class="form-control mb-3">

<label>Correo</label>
<input id="correo" class="form-control mb-3">

<label>Dirección</label>
<input id="direccion" class="form-control mb-3">

<label>Estado</label>

<select id="estado" class="form-control">

<option>Activo</option>
<option>Inactivo</option>

</select>

</div>

<div class="modal-footer">

<button
class="btn btn-secondary"
type="button"
data-bs-dismiss="modal">

Cancelar

</button>

<button
class="btn btn-success"
type="submit">

Guardar

</button>

</div>

</form>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/proveedores.js"></script>

</body>
</html>
