<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panela Pro - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <h1>Panela Pro</h1>
            <p>Sistema de gestión panelera</p>

            <form id="loginForm">
                <label>Usuario</label>
                <input type="text" id="usuario" placeholder="Ingrese su usuario">

                <label>Contraseña</label>
                <input type="password" id="contrasena" placeholder="Ingrese su contraseña">

                <button type="submit">Iniciar sesión</button>
            </form>

            <div id="mensaje"></div>

            <small>Usuario: admin | Contraseña: 123456</small>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
